name: Run unit tests and examples
on: [ 'pull_request' ]
jobs:
  tests_and_example_matrix:
    strategy:
      matrix:
        config:
          # - os: ubuntu-24.04
          #   compiler: gcc-14
          # - os: ubuntu-24.04
          #   compiler: clang-19
          # - os: ubuntu-24.04
          #   compiler: clang-20

          # - os: ubuntu-24.04-arm
          #   compiler: gcc-14
          # - os: ubuntu-24.04-arm
          #   compiler: clang-19
          # - os: ubuntu-24.04-arm
          #   compiler: clang-20

          - os: macos-16
            compiler: gcc-15

      fail-fast: false
    name: ${{ matrix.config.compiler }}, ${{ matrix.config.os }}
    uses: ./.github/workflows/reusable_run_test_and_examples.yml
    with:
      os: ${{ matrix.config.os }}
      compiler: ${{ matrix.config.compiler }}
      cmake-version: 3.24.0
      conan-version: 2.17.0
      with-coverage: false
      with-sanitizer: ${{ matrix.config.compiler == 'clang-20' }}
