on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
      compiler:
        required: true
        type: string
      cmake-version:
        required: true
        type: string
      build-shared-libs:
        required: true
        type: boolean
      with-coverage:
        type: boolean
      with-sanitizer:
        type: boolean
    secrets:
      coverall-token:
        description: 'Access token for coverall. Required if inputs.with-coverage'
        required: false

jobs:
  tests-and-examples:
    name: ${{ fromJSON('["static", "shared"]')[inputs.build-shared-libs] }} lib${{ fromJSON('["", " + sanitizers"]')[inputs.with-sanitizer] }}${{ fromJSON('["", " + code coverage"]')[inputs.with-coverage] }}${{ fromJSON('["", " + AVX"]')[inputs.with-AVX] }}
    runs-on: ${{ inputs.os }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Add Repos for for gcc-13 and clang-17
        if: ${{ inputs.os != 'macos-15' }}
        uses: dice-group/cpp-conan-release-reusable-workflow/.github/actions/setup_apt@main

      - name: Ensure stdlib version
        if: ${{ inputs.os != 'macos-15' }}
        run: |
          sudo apt install libstdc++-13-dev -y

      - name: Get minimum cmake version
        uses: lukka/get-cmake@v3.29.3
        with:
          cmakeVersion: ${{ inputs.cmake-version }}

      - name: Install compiler
        id: install_cc
        if: ${{ inputs.os != 'macos-15' }}
        uses: rlalik/setup-cpp-compiler@v1.2
        with:
          compiler: ${{ inputs.compiler }}

      - name: fix compiler (macos)
        if: ${{ inputs.os == 'macos-15' }}
        run: |
          brew uninstall gcc@12
          brew uninstall gcc@13
          brew uninstall gcc@14
          brew autoremove
          brew cleanup
          brew install gcc@14

      - name: use mold as default linker
        if: ${{ inputs.os != 'macos-15' }}
        uses: rui314/setup-mold@v1

      - name: Configure conan
        uses: dice-group/cpp-conan-release-reusable-workflow/.github/actions/configure_conan@main
        with:
          conan-version: 2.8.1

      - name: add conan user
        run: |
          conan remote add -f dice-group https://conan.dice-research.org/artifactory/api/conan/tentris

      - name: Cache conan data
        id: cache-conan
        uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: ${{ inputs.os }}-${{ inputs.compiler }}-conan2${{ fromJSON('["", "-coverage"]')[inputs.with-coverage] }}${{ fromJSON('["", "-sanitizer"]')[inputs.with-sanitizer] }}${{ fromJSON('["", "-avx"]')[inputs.with-avx] }}

      - name: install gcovr
        if: inputs.with-coverage
        run: |
          pip3 install gcovr

      - name: Check out sources
        uses: actions/checkout@v3

      - name: Get dependency provider
        uses: dice-group/cpp-conan-release-reusable-workflow/.github/actions/add_conan_provider@fix/dependency_provider_macos

      - name: Configure CMake
        if: ${{ inputs.os != 'macos-15' }}
        env:
          CC: ${{ steps.install_cc.outputs.cc }}
          CXX: ${{ steps.install_cc.outputs.cxx }}
          CXXFLAGS: -Wno-unused-command-line-argument -fuse-ld=mold ${{ fromJSON('["", "-fsanitize=undefined -fsanitize=address -fno-omit-frame-pointer -fno-optimize-sibling-calls"]')[inputs.with-sanitizer] }} ${{ fromJSON('["", "--coverage"]')[inputs.with-coverage] }}
        run: >
          cmake -G Ninja -B build_dir -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTING=ON -DBUILD_EXAMPLES=ON -DCMAKE_PROJECT_TOP_LEVEL_INCLUDES=conan_provider.cmake -DCMAKE_COMPILE_WARNING_AS_ERROR=ON
          ${{ fromJSON('["", "-DBUILD_SHARED_LIBS=ON -DCMAKE_POSITION_INDEPENDENT_CODE=ON"]')[inputs.build-shared-libs] }}

      - name: Setup env for macos
        if: ${{ inputs.os == 'macos-15' }}
        run: |
          CC_VER="${{ inputs.compiler }}"
          if [[ ${CC_VER:0:4} != gcc- ]] ; then exit 1; fi
          GCC_VERSION=${CC_VER:4:6}
          GCC_PREFIX="$(brew --prefix "gcc@${GCC_VERSION}")"
          echo CC="${GCC_PREFIX}/bin/gcc-${GCC_VERSION}" >> $GITHUB_ENV
          echo CXX="${GCC_PREFIX}/bin/g++-${GCC_VERSION}" >> $GITHUB_ENV

      - name: Configure CMake (macos)
        if: ${{ inputs.os == 'macos-15' }}
        env:
          CXXFLAGS: -march=armv8-a+aes+sha2 -Wno-unused-command-line-argument ${{ fromJSON('["", "-fsanitize=undefined -fsanitize=address -fno-omit-frame-pointer -fno-optimize-sibling-calls"]')[inputs.with-sanitizer] }} ${{ fromJSON('["", "--coverage"]')[inputs.with-coverage] }}
        run: >
          cmake -G Ninja -B build_dir -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTING=ON -DBUILD_EXAMPLES=ON -DCMAKE_PROJECT_TOP_LEVEL_INCLUDES=conan_provider.cmake -DCMAKE_COMPILE_WARNING_AS_ERROR=ON
          ${{ fromJSON('["", "-DBUILD_SHARED_LIBS=ON -DCMAKE_POSITION_INDEPENDENT_CODE=ON"]')[inputs.build-shared-libs] }}

      - name: Build Tests & Examples
        working-directory: build_dir
        run: cmake --build . --parallel 2

      - name: Run tests
        working-directory: build_dir
        run: ctest --parallel 2 --verbose

      - name: Report coverage
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.coverall-token }}
        if: inputs.with-coverage
        run: |
          gcovr --gcov-executable gcov-13 --coveralls --filter 'src/' -o coverage.json -r ./
          curl -F "json_file=@coverage.json" https://coveralls.io/api/v1/jobs

      - name: Run examples
        working-directory: build_dir
        run: |
          cd examples
          for example in *_example; do 
            echo "executing ${example}"
            ./${example}
          done
